<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0" >
    <title>SaaSFlow | Sign Up</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- font-awesome CDN -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <!-- CSS File -->
    <link rel="stylesheet" href="css/style.css" >
</head>

<body class="auth-body">
    <section class="container py-5">
        <section class="auth-topbar">
            <a href="index.html" class="brand-inline"><img class="brand-mark" src="./assets/logo.png"
                    alt="">SaaSFlow</a>
            <button class="btn theme-nav-btn" type="button" title="Switch to light mode">
                <i class="fa-solid fa-moon"></i>
                <span class="d-none d-md-inline">Theme</span>
            </button>
        </section>
        <section class="auth-card mx-auto">
            <section class="auth-header text-center mb-4">
                <h2 class="mt-1">Create your account</h2>
                <p class="text-muted mb-0">Sign up to start onboarding and access the dashboard preview.</p>
            </section>
            <form id="signupForm" novalidate>
                <section class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control form-control-lg" id="signupName" placeholder="Your name">
                    <small class="text-danger d-none" id="signupNameError">Name is required.</small>
                </section>
                <section class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control form-control-lg" id="signupEmail"
                        placeholder="name@example.com">
                    <small class="text-danger d-none" id="signupEmailError">Please enter a valid email.</small>
                </section>
                <section class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control form-control-lg" id="signupPassword"
                        placeholder="Create password">
                    <small class="text-danger d-none" id="signupPasswordError">Password must be at least 6
                        characters.</small>
                </section>
                <button type="submit" class="btn btn-primary w-100 btn-lg">Create account</button>
            </form>
            <p class="text-center mt-3 mb-0">Already have an account? <a href="login.html">Login</a></p>
        </section>
    </section>
    
    <!-- main JS file -->
    <script src="js/main.js"></script>
    
    <!-- auth JS file -->
    <script src="js/auth.js"></script>
</body>

</html>
